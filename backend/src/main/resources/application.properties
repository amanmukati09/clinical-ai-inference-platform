# Server
server.port=8080
spring.application.name=clinical-ai-platform

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/clinicalai
spring.datasource.username=clinicalai
spring.datasource.password=clinicalai123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ML Service
ml.service.base-url=http://localhost:8000
ml.service.timeout-seconds=30

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always